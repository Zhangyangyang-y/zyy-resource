<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 · 星衡智体</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
  <div class="login-card" style="animation: scaleIn 0.4s ease;">
    <a href="{{ url_for('welcome') }}" class="login-back-link">
      <i class="bi bi-arrow-left"></i> 返回首页
    </a>

    <div class="login-card-header">
      <div class="brand-icon" style="background:linear-gradient(135deg,#A8D2FF,#8FC1F0);"><i class="bi bi-shield-check"></i></div>
      <h2>管理员登录</h2>
      <p>星衡智体健康平台 · 管理中心</p>
    </div>

    <form class="login-form" method="POST" action="{{ url_for('admin_login') }}">
      {% if error %}
      <div class="login-error">
        <i class="bi bi-exclamation-circle"></i> {{ error }}
      </div>
      {% endif %}

      <div class="form-group">
        <label>管理员账号</label>
        <input type="text" class="form-input" name="username" placeholder="请输入管理员账号" required autofocus>
      </div>

      <div class="form-group">
        <label>密码</label>
        <input type="password" class="form-input" name="password" placeholder="请输入密码" required>
      </div>

      <button type="submit" class="login-btn" style="background:linear-gradient(135deg,#A8D2FF,#8FC1F0);">
        <i class="bi bi-shield me-1"></i> 进入管理后台
      </button>
    </form>

    <div class="login-footer" style="margin-top:16px;">
      <a href="{{ url_for('user_login') }}" style="font-size:12px;color:rgba(255,255,255,0.25);">
        <i class="bi bi-person"></i> 用户登录入口
      </a>
    </div>
  </div>
</body>
</html>
