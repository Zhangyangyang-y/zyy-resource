{% extends "base.html" %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card">
      <div class="card-body p-4">
        <form id="memberForm">
          <div class="mb-3">
            <label class="form-label">姓名 <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="name" value="{{ member.name if member else '' }}" placeholder="请输入姓名" required>
          </div>

          <div class="mb-3">
            <label class="form-label">性别</label>
            <div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" value="男" id="genderMale"
                {% if not member or member.gender == '男' %}checked{% endif %}>
                <label class="form-check-label" for="genderMale">男</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" value="女" id="genderFemale"
                {% if member and member.gender == '女' %}checked{% endif %}>
                <label class="form-check-label" for="genderFemale">女</label>
              </div>
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label">身高 (cm) <span class="text-danger">*</span></label>
              <input type="number" step="0.1" class="form-control" name="height" value="{{ member.height if member else '' }}" placeholder="例如 170" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">年龄</label>
              <input type="number" class="form-control" name="age" value="{{ member.age if member else '25' }}" placeholder="例如 25">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">活动水平</label>
            <select class="form-select" name="activity">
              {% for a in ['久坐', '轻度活动', '中度活动', '高度活动', '极高活动'] %}
              <option value="{{ a }}" {% if member and member.activity == a %}selected{% elif not member and a == '中度活动' %}selected{% endif %}>{{ a }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label">目标体重 (kg)</label>
              <input type="number" step="0.1" class="form-control" name="target_weight" value="{{ member.target_weight if member and member.target_weight else '' }}" placeholder="可选">
            </div>
            <div class="col-md-6">
              <label class="form-label">目标日期</label>
              <input type="date" class="form-control" name="target_date" value="{{ member.target_date if member and member.target_date else '' }}">
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4"><i class="bi bi-check-lg me-1"></i>保存</button>
            <a href="{{ url_for('member_list') }}" class="btn btn-outline-secondary px-4">取消</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
document.getElementById('memberForm').addEventListener('submit', function(e) {
  e.preventDefault();
  fetch(window.location.pathname, { method: 'POST', body: new FormData(this) })
    .then(r => r.json())
    .then(d => {
      if (d.success) { showToast(d.message, 'success'); setTimeout(() => window.location.href = '{{ url_for("member_list") }}', 800); }
      else showToast(d.message, 'danger');
    })
    .catch(() => showToast('提交失败', 'danger'));
});
</script>
{% endblock %}
