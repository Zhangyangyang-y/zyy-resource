<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星衡智体 · 健康平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="welcome-page">
  <div class="welcome-bg-grid"></div>

  <!-- Floating decorative elements (fixed position, edge-aligned) -->
  <div class="float-icon" style="top:12%;left:4%;animation-delay:0s;font-size:44px;opacity:0.6;"><i class="bi bi-heart-pulse"></i></div>
  <div class="float-icon" style="top:18%;right:4%;animation-delay:1.2s;font-size:38px;opacity:0.5;"><i class="bi bi-activity"></i></div>
  <div class="float-icon" style="bottom:20%;left:3%;animation-delay:2.4s;font-size:48px;opacity:0.55;"><i class="bi bi-cpu"></i></div>
  <div class="float-icon" style="bottom:15%;right:3%;animation-delay:3.6s;font-size:40px;opacity:0.5;"><i class="bi bi-graph-up-arrow"></i></div>
  <div class="float-icon" style="top:45%;left:2%;animation-delay:4.2s;font-size:32px;opacity:0.45;"><i class="bi bi-star-fill"></i></div>
  <div class="float-icon" style="top:55%;right:2%;animation-delay:0.6s;font-size:36px;opacity:0.5;"><i class="bi bi-shield-check"></i></div>

  <!-- Large decorative glow behind hero -->
  <div class="hero-glow"></div>

  <!-- Top Nav -->
  <nav class="welcome-nav animate-in">
    <a class="welcome-logo" href="{{ url_for('welcome') }}">
      <div class="welcome-logo-icon"><i class="bi bi-star-fill"></i></div>
      <span class="welcome-logo-text">星衡智体</span>
    </a>
    <div class="welcome-nav-links">
      <a href="{{ url_for('user_login') }}" class="welcome-nav-btn welcome-nav-btn-outline">用户登录</a>
      <a href="{{ url_for('admin_login') }}" class="welcome-nav-btn welcome-nav-btn-primary"><i class="bi bi-shield me-1"></i>管理员</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="welcome-hero">
    <div class="welcome-hero-inner">
      <div class="welcome-badge animate-in">
        <span class="badge-dot"></span> 智能体态健康管理平台
      </div>
      <h1 class="animate-in">
        智启<span>健康</span>新生<br>
        慧见<span>体态</span>之美
      </h1>
      <p class="animate-in">
        星衡智体健康平台，基于 AI 体态检测与大数据分析，<br>
        为您提供个性化的健康管理方案。
      </p>
      <div class="welcome-hero-actions animate-in">
        <a href="{{ url_for('register') }}" class="welcome-hero-btn welcome-hero-btn-primary">
          <i class="bi bi-person-plus"></i> 注册新账号
        </a>
        <a href="{{ url_for('user_login') }}" class="welcome-hero-btn welcome-hero-btn-secondary">
          <i class="bi bi-box-arrow-in-right"></i> 登录
        </a>
      </div>
    </div>
  </section>

  <!-- Features -->
  <div class="welcome-features animate-in">
    <div class="welcome-feature-item">
      <i class="bi bi-cpu"></i> AI 体态分析
    </div>
    <div class="welcome-feature-item">
      <i class="bi bi-graph-up"></i> 智能数据追踪
    </div>
    <div class="welcome-feature-item">
      <i class="bi bi-file-text"></i> 个性化方案
    </div>
    <div class="welcome-feature-item">
      <i class="bi bi-shield-check"></i> 科学健康管理
    </div>
  </div>

  <!-- Footer -->
  <div class="welcome-footer">
    <span>© 2026 星衡智体健康平台 · 科学管理，智享健康</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
