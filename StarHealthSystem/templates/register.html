<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 · 星衡智体</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
  <div class="login-card" style="animation: scaleIn 0.4s ease;">
    <a href="{{ url_for('welcome') }}" class="login-back-link">
      <i class="bi bi-arrow-left"></i> 返回首页
    </a>

    <div class="login-card-header">
      <div class="brand-icon"><i class="bi bi-person-plus"></i></div>
      <h2>注册新账号</h2>
      <p>开启您的健康管理之旅</p>
    </div>

    <form class="login-form" method="POST" action="{{ url_for('register') }}">
      {% if error %}
      <div class="login-error">
        <i class="bi bi-exclamation-circle"></i> {{ error }}
      </div>
      {% endif %}

      <div class="form-group">
        <label>用户名</label>
        <input type="text" class="form-input" name="username" placeholder="用于登录的用户名" required autofocus>
      </div>

      <div class="form-group">
        <label>昵称（可选）</label>
        <input type="text" class="form-input" name="display_name" placeholder="页面显示的名称">
      </div>

      <div class="form-group">
        <label>密码</label>
        <input type="password" class="form-input" name="password" placeholder="至少 4 位" required>
      </div>

      <div class="form-group">
        <label>确认密码</label>
        <input type="password" class="form-input" name="confirm" placeholder="再次输入密码" required>
      </div>

      <button type="submit" class="login-btn">
        <i class="bi bi-check-lg me-1"></i> 注 册
      </button>
    </form>

    <div class="login-footer" style="margin-top:16px;">
      已有账号？<a href="{{ url_for('user_login') }}">立即登录</a>
    </div>
  </div>
</body>
</html>
