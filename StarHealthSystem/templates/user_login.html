<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户登录 · 星衡智体</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
  <div class="login-card" style="animation: scaleIn 0.4s ease;">
    <a href="{{ url_for('welcome') }}" class="login-back-link">
      <i class="bi bi-arrow-left"></i> 返回首页
    </a>

    <div class="login-card-header">
      <div class="brand-icon"><i class="bi bi-star-fill"></i></div>
      <h2>用户登录</h2>
      <p>登录后查看您的个人体态数据</p>
    </div>

    <form class="login-form" method="POST" action="{{ url_for('user_login') }}">
      {% if error %}
      <div class="login-error">
        <i class="bi bi-exclamation-circle"></i> {{ error }}
      </div>
      {% endif %}

      <div class="form-group">
        <label>用户名</label>
        <input type="text" class="form-input" name="username" placeholder="请输入用户名" required autofocus>
      </div>

      <div class="form-group">
        <label>密码</label>
        <input type="password" class="form-input" name="password" placeholder="请输入密码" required>
      </div>

      <button type="submit" class="login-btn">
        <i class="bi bi-box-arrow-in-right me-1"></i> 登 录
      </button>
    </form>

    <div class="login-divider">或者</div>

    <div class="login-footer">
      还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
    </div>

    <div class="login-footer" style="margin-top:12px;">
      <a href="{{ url_for('admin_login') }}" style="font-size:12px;color:rgba(255,255,255,0.25);">
        <i class="bi bi-shield"></i> 管理员入口
      </a>
    </div>
  </div>
</body>
</html>
